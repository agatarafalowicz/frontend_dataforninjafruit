# Buduje .ipa na macOS w chmurze GitHub.
# Wymaga sekretów (Settings → Secrets and variables → Actions) — patrz komentarz na dole.
name: iOS IPA (manual signing)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Klucz tymczasowy + certyfikat .p12 + profil provisioning (z Apple Developer)
      - name: Import certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/cert.p12"
          PP="$RUNNER_TEMP/profile.mobileprovision"
          KC="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -d > "$CERT"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 -d > "$PP"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security list-keychain -d user -s "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KC"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      - run: flutter pub get

      - name: CocoaPods
        run: cd ios && pod install

      # Dopasuj bundle ID i nazwę profilu do tego, co masz w developer.apple.com
      - name: Export options (manual signing)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          test -n "$APPLE_TEAM_ID" && test -n "$IOS_BUNDLE_ID" && test -n "$IOS_PROVISIONING_PROFILE_SPECIFIER"
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

# ── Sekrety w GitHub (Repository → Settings → Secrets and variables → Actions) ──
#
# BUILD_CERTIFICATE_BASE64
#   Plik .p12 (certyfikat + klucz prywatny) zakodowany base64.
#   Windows (PowerShell): [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\sciezka\cert.p12"))
#
# P12_PASSWORD
#   Hasło ustawione przy eksporcie .p12 z Keychaina (lub przy tworzeniu).
#
# BUILD_PROVISION_PROFILE_BASE64
#   Plik .mobileprovision w base64 (ten sam profil co w Xcode / portalu).
#
# KEYCHAIN_PASSWORD
#   Dowolne silne hasło (tylko na czas joba na runnerze); nie musi być z Apple.
#
# APPLE_TEAM_ID
#   10 znaków, np. AB1CD23EF4 — Membership details w developer.apple.com
#
# IOS_BUNDLE_ID
#   Ten sam co PRODUCT_BUNDLE_IDENTIFIER w Xcode, np. com.twojafirma.appname
#   (zmień z com.example... zanim wrzucisz do sklepu / na urządzenia).
#
# IOS_PROVISIONING_PROFILE_SPECIFIER
#   Dokładna nazwa profilu z listy Profiles w developer.apple.com (nie UUID pliku).
#
# Uwaga: method ad-hoc wymaga certyfikatu „Apple Distribution” / odpowiedniego profilu Ad Hoc
# z zarejestrowanym UDID Twojego iPhone’a. Dla samego development czasem używa się method=development.
